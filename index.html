<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Volusia Schools</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>html,body,#app{height:100%;margin:0;font-family:Arial,sans-serif}#app{display:grid;grid-template-columns:340px 1fr}.side{overflow:auto;padding:16px;border-right:1px solid #ddd}.map{height:100%}input{width:100%;padding:10px;box-sizing:border-box;margin:8px 0 12px}.school{padding:10px 0;border-bottom:1px solid #eee;cursor:pointer}.school b{display:block}.school small{color:#666}.filters button{margin:3px;padding:6px 9px}.active{background:#111;color:#fff}@media(max-width:700px){#app{grid-template-columns:1fr;grid-template-rows:42% 58%}.side{border-right:0;border-bottom:1px solid #ddd}}</style></head><body><div id="app"><aside class="side"><h2>Volusia Schools</h2><input id="q" placeholder="Search school or city"><div class="filters" id="filters"></div><p id="status"></p><div id="list"></div></aside><div id="map" class="map"></div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="schools.js"></script><script>const map=L.map('map').setView([29.05,-81.05],9);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);const layer=L.layerGroup().addTo(map),markers=new Map();let type='All',q='';const colors={Elementary:'#16a34a',Middle:'#f59e0b',High:'#dc2626','Middle-High':'#7c3aed',Other:'#2563eb'};const icon=t=>L.divIcon({className:'',html:`<div style="width:15px;height:15px;border-radius:50%;background:${colors[t]||colors.Other};border:3px solid white;box-shadow:0 1px 5px #0008"></div>`,iconSize:[15,15],iconAnchor:[7,7]});const ok=s=>(type==='All'||s.type===type)&&(s.name+' '+s.address).toLowerCase().includes(q.toLowerCase());function render(){list.innerHTML='';layer.clearLayers();const shown=schools.filter(ok);status.textContent=`Showing ${shown.length} of ${schools.length} schools`;shown.forEach(s=>{const d=document.createElement('div');d.className='school';d.innerHTML=`<b>${s.name}</b><small>${s.address}</small>`;d.onclick=()=>{const m=markers.get(s.name);if(m){map.setView(m.getLatLng(),15);m.openPopup()}else open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.name+' '+s.address))};list.appendChild(d);const m=markers.get(s.name);if(m)m.addTo(layer)})}async function load(){let n=0,b=[];for(const s of schools){let p=JSON.parse(localStorage.getItem(s.address)||'null');if(!p){try{const r=await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=us&q='+encodeURIComponent(s.address));const d=await r.json();if(d[0]){p=[+d[0].lat,+d[0].lon];localStorage.setItem(s.address,JSON.stringify(p))}}catch{}await new Promise(r=>setTimeout(r,1050))}if(p){n++;b.push(p);const m=L.marker(p,{icon:icon(s.type)}).bindPopup(`<b>${s.name}</b><br>${s.address}<br><a target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(s.address)}">Get directions</a>`);markers.set(s.name,m);if(ok(s))m.addTo(layer)}status.textContent=`Located ${n} of ${schools.length} schools`}if(b.length)map.fitBounds(b,{padding:[20,20]});render()}const types=['All',...new Set(schools.map(s=>s.type))];filters.innerHTML=types.map(t=>`<button data-t="${t}" class="${t==='All'?'active':''}">${t}</button>`).join('');filters.onclick=e=>{if(e.target.tagName==='BUTTON'){type=e.target.dataset.t;[...filters.children].forEach(x=>x.classList.toggle('active',x===e.target));render()}};document.getElementById('q').oninput=e=>{q=e.target.value;render()};render();load();</script></body></html>
