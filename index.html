<style>
:root{--panel:#fff;--ink:#162033;--muted:#64748b;--line:#e2e8f0;--accent:#2563eb;--bg:#f8fafc}

const map=L.map('map',{zoomControl:true}).setView([29.05,-81.05],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
const markerLayer=L.layerGroup().addTo(map), markers=new Map();
const typeColors={Elementary:'#16a34a',Middle:'#f59e0b',High:'#dc2626','Middle-High':'#7c3aed',Other:'#2563eb'};
let activeType='All', query='';
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function dotIcon(type){const c=typeColors[type]||typeColors.Other;return L.divIcon({className:'',html:`<div style="width:16px;height:16px;border-radius:50%;background:${c};border:3px solid white;box-shadow:0 1px 6px #0007"></div>`,iconSize:[16,16],iconAnchor:[8,8]});}
function match(s){const hay=(s.name+' '+s.address).toLowerCase();return (activeType==='All'||s.type===activeType)&&hay.includes(query.toLowerCase())}
function render(){const list=document.getElementById('list');list.innerHTML='';markerLayer.clearLayers();let shown=0;schools.filter(match).forEach(s=>{shown++;const row=document.createElement('div');row.className='school';row.innerHTML=`<div class="school-name">${esc(s.name)}</div><div class="school-address">${esc(s.address)}</div><span class="badge">${esc(s.type)}</span>`;row.onclick=()=>focusSchool(s);list.appendChild(row);const m=markers.get(s.name);if(m)m.addTo(markerLayer)});document.getElementById('status').textContent=`Showing ${shown} of ${schools.length} schools`}
function focusSchool(s){const m=markers.get(s.name);if(m){map.setView(m.getLatLng(),15);m.openPopup()}else window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+' '+s.address)}`,'_blank')}
async function geocodeAll(){let located=0;const bounds=[];for(const s of schools){const key='geo:'+s.address;let p;try{p=JSON.parse(localStorage.getItem(key)||'null')}catch{}if(!p){try{const r=await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=us&q='+encodeURIComponent(s.address),{headers:{'Accept':'application/json'}});const d=await r.json();if(d[0]){p={lat:+d[0].lat,lng:+d[0].lon};localStorage.setItem(key,JSON.stringify(p))}}catch(e){}await new Promise(r=>setTimeout(r,1050))}if(p){located++;bounds.push([p.lat,p.lng]);const m=L.marker([p.lat,p.lng],{icon:dotIcon(s.type)}).bindPopup(`<div class="popup-title">${esc(s.name)}</div><div>${esc(s.address)}</div><a class="popup-link" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(s.address)}">Get directions →</a>`);markers.set(s.name,m);if(match(s))m.addTo(markerLayer)}document.getElementById('status').textContent=`Located ${located} of ${schools.length} schools…`}if(bounds.length)map.fitBounds(bounds,{padding:[30,30]});render()}
